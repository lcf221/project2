<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mood Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app">

      <!-- ══════════════════════════════════════════
           SCREEN 1 · WELCOME  (auto-advance 5s)
      ══════════════════════════════════════════ -->
      <div class="screen active" id="screen-welcome">
        <img src="assets/welcome.png" alt="Welcome Back!" class="full-img">
        <div class="splash-countdown" id="splash-bar"></div>
      </div>

      <!-- ══════════════════════════════════════════
           SCREEN 2 · MOOD SELECTION
      ══════════════════════════════════════════ -->
      <div class="screen" id="screen-mood-select">
        <div class="img-wrapper">
          <img src="assets/mood-select.png" alt="How are you feeling today?" class="full-img">

          <!--
            Transparent buttons sit on top of each plant character.
            Toggle SHOW_DEBUG in script.js to see their outlines.
          -->
          <button class="plant-btn mood-happy"    data-mood="happy"    aria-label="Happy"></button>
          <button class="plant-btn mood-sad"      data-mood="sad"      aria-label="Sad"></button>
          <button class="plant-btn mood-meh"      data-mood="meh"      aria-label="Meh"></button>
          <button class="plant-btn mood-stressed" data-mood="stressed" aria-label="Stressed"></button>
          <button class="plant-btn mood-angry"    data-mood="angry"    aria-label="Angry"></button>

          <!-- Covers the static date in the PNG and shows today's real date -->
          <div class="date-overlay">
            <span class="date-label">TODAY IS:</span>
            <span class="date-value" id="current-date"></span>
          </div>
        </div>
      </div>

      <!-- ══════════════════════════════════════════
           SCREENS 3–7 · INDIVIDUAL MOOD SCREENS
           Each auto-advances to the calendar (3s).
           Tapping also advances immediately.
      ══════════════════════════════════════════ -->
      <div class="screen mood-screen" id="screen-happy">
        <img src="assets/happy.png" alt="I am feeling Happy" class="full-img">
        <div class="tap-hint">Tap to continue</div>
      </div>

      <div class="screen mood-screen" id="screen-sad">
        <img src="assets/sad.png" alt="I am feeling Sad" class="full-img">
        <div class="tap-hint">Tap to continue</div>
      </div>

      <div class="screen mood-screen" id="screen-meh">
        <img src="assets/meh.png" alt="I am feeling Meh" class="full-img">
        <div class="tap-hint">Tap to continue</div>
      </div>

      <div class="screen mood-screen" id="screen-stressed">
        <img src="assets/stressed.png" alt="I am feeling Stressed" class="full-img">
        <div class="tap-hint">Tap to continue</div>
      </div>

      <div class="screen mood-screen" id="screen-angry">
        <img src="assets/angry.png" alt="I am feeling Angry" class="full-img">
        <div class="tap-hint">Tap to continue</div>
      </div>

      <!-- ══════════════════════════════════════════
           SCREEN 8 · MONTHLY CALENDAR
      ══════════════════════════════════════════ -->
      <div class="screen" id="screen-calendar">
        <div class="toolbar">
          <button class="tb-nav" id="cal-prev" aria-label="Previous month">&#10094;</button>
          <div class="tb-icons">
            <button class="tb-icon-btn" id="tb-pencil-cal"    title="Log today's mood">&#9998;</button>
            <button class="tb-icon-btn" id="tb-cal-to-tracker" title="Year view">&#9783;</button>
            <button class="tb-icon-btn tb-active"              title="Month view">&#9776;</button>
          </div>
          <button class="tb-nav" id="cal-next" aria-label="Next month">&#10095;</button>
        </div>
        <div id="calendar-body"></div>
      </div>

      <!-- ══════════════════════════════════════════
           SCREEN 9 · YEARLY TRACKER
      ══════════════════════════════════════════ -->
      <div class="screen" id="screen-tracker">
        <div class="toolbar">
          <button class="tb-nav" id="yr-prev" aria-label="Previous year">&#10094;</button>
          <div class="tb-icons">
            <button class="tb-icon-btn" id="tb-pencil-tracker"  title="Log today's mood">&#9998;</button>
            <button class="tb-icon-btn tb-active"               title="Year view">&#9783;</button>
            <button class="tb-icon-btn" id="tb-tracker-to-cal" title="Month view">&#9776;</button>
          </div>
          <button class="tb-nav" id="yr-next" aria-label="Next year">&#10095;</button>
        </div>

        <div id="tracker-body"></div>

        <!-- Mood legend at the bottom -->
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#e8d878"></span>Happy</div>
          <div class="legend-item"><span class="legend-dot" style="background:#7ab8d8"></span>Sad</div>
          <div class="legend-item"><span class="legend-dot" style="background:#c4a8d8"></span>Meh</div>
          <div class="legend-item"><span class="legend-dot" style="background:#e07858"></span>Stressed</div>
          <div class="legend-item"><span class="legend-dot" style="background:#7fb87f"></span>Angry</div>
        </div>
      </div>

    </div><!-- /#app -->
    <script src="script.js"></script>
  </body>
</html>
